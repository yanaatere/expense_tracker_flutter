name: expense_tracker_flutter
description: Monex Finance — smart expense tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.2
  sqflite: ^2.3.3
  path: ^1.9.0
  connectivity_plus: ^7.0.0
  crypto: ^3.0.3
  adaptive_platform_ui: ^0.1.103

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/background.webp
    - assets/icons/
    - assets/icons/wallets/
